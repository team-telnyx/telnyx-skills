name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, restructure/monorepo]
  workflow_dispatch:
    inputs:
      run_write_tests:
        description: 'Run write tests (creates and cleans up real resources)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  unit-tests:
    name: Unit Tests (no API key)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Python unit tests
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python deps
        working-directory: tools/python
        run: pip install -e ".[dev]"
      - name: Python unit tests
        working-directory: tools/python
        run: pytest tests/test_tools.py tests/test_configuration.py tests/test_api_client.py tests/test_openai_toolkit.py tests/test_x402.py -v

      # TypeScript compilation
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install TS SDK deps
        working-directory: tools/typescript
        run: npm ci
      - name: TypeScript SDK compilation
        working-directory: tools/typescript
        run: npx tsc --noEmit
      - name: Install CLI deps
        working-directory: cli
        run: npm ci
      - name: CLI compilation
        working-directory: cli
        run: npx tsc --noEmit

      # Cross-package parity
      - name: Cross-package parity check
        run: |
          PY_TOOLS=$(python3 -c "
          import ast, sys
          sys.path.insert(0, 'tools/python')
          from telnyx_agent_toolkit.shared.constants import TOOL_DEFINITIONS
          print('\n'.join(sorted(TOOL_DEFINITIONS.keys())))
          ")
          TS_TOOLS=$(node -e "
          const fs = require('fs');
          const content = fs.readFileSync('tools/typescript/src/shared/constants.ts', 'utf8');
          const toolSection = content.split('TOOL_DEFINITIONS')[1] || '';
          const names = [];
          for (const line of toolSection.split('\n')) {
            const m = line.match(/^  (\w+): \{$/);
            if (m) names.push(m[1]);
          }
          console.log(names.sort().join('\n'));
          ")
          if [ "$PY_TOOLS" != "$TS_TOOLS" ]; then
            echo "MISMATCH!"
            diff <(echo "$PY_TOOLS") <(echo "$TS_TOOLS")
            exit 1
          fi
          echo "✅ Python and TypeScript SDKs have identical tool sets"

      # Guide structural tests
      - name: Guide structural tests
        run: npx tsx --test tests/guides.test.ts

  api-readonly:
    name: API Read-Only Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    env:
      TELNYX_API_KEY: ${{ secrets.TELNYX_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Python read-only
      - name: Install Python deps
        working-directory: tools/python
        run: pip install -e ".[dev]"
      - name: Python API read-only tests
        working-directory: tools/python
        run: pytest tests/test_integration_ci.py -v -k "readonly"

      # TS SDK read-only
      - name: Install TS SDK deps
        working-directory: tools/typescript
        run: npm ci
      - name: TS SDK API read-only tests
        working-directory: tools/typescript
        run: npx tsx tests/integration-ci.test.ts

      # Install Go CLI (telnyx-cli)
      - name: Install telnyx CLI (Go)
        run: |
          curl -fsSL -o /tmp/telnyx.tar.gz https://github.com/team-telnyx/telnyx-cli/releases/download/v0.11.0/telnyx_0.11.0_linux_amd64.tar.gz
          tar -xzf /tmp/telnyx.tar.gz -C /usr/local/bin telnyx
          chmod +x /usr/local/bin/telnyx
          telnyx --version

      # CLI read-only
      - name: Install CLI deps
        working-directory: cli
        run: npm ci
      - name: CLI read-only tests
        working-directory: cli
        run: npx tsx tests/integration-ci.test.ts

      # Guide API smoke tests
      - name: Guide API smoke tests
        run: npx tsx --test tests/guides-api.test.ts
        env:
          TELNYX_API_KEY: ${{ secrets.TELNYX_API_KEY }}

  api-write:
    name: API Write + Cleanup Tests (Telnyx network)
    runs-on: telnyx-2xsmall
    needs: api-readonly
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_write_tests == 'true')
    env:
      TELNYX_API_KEY: ${{ secrets.TELNYX_API_KEY }}
      RUN_WRITE_TESTS: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Python write tests
      - name: Install Python deps
        working-directory: tools/python
        run: pip install -e ".[dev]"
      - name: Python API write tests
        continue-on-error: true
        working-directory: tools/python
        run: pytest tests/test_integration_ci.py -v -k "write"

      # TS SDK write tests
      - name: Install TS SDK deps
        working-directory: tools/typescript
        run: npm ci
      - name: TS SDK write tests
        continue-on-error: true
        working-directory: tools/typescript
        run: RUN_WRITE_TESTS=true npx tsx tests/integration-ci.test.ts

      # Install Go CLI (telnyx-cli)
      - name: Install telnyx CLI (Go)
        run: |
          curl -fsSL -o /tmp/telnyx.tar.gz https://github.com/team-telnyx/telnyx-cli/releases/download/v0.11.0/telnyx_0.11.0_linux_amd64.tar.gz
          tar -xzf /tmp/telnyx.tar.gz -C /usr/local/bin telnyx
          chmod +x /usr/local/bin/telnyx
          telnyx --version

      # CLI write tests
      - name: Install CLI deps
        working-directory: cli
        run: npm ci
      - name: CLI write tests
        continue-on-error: true
        working-directory: cli
        run: RUN_WRITE_TESTS=true npx tsx tests/integration-ci-write.test.ts


