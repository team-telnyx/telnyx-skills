# Publish @telnyx/agent-toolkit and @telnyx/agent-cli to npm using OIDC.
# Triggered by GitHub Release or manual dispatch.
#
# npm setup required (one-time, by someone with @telnyx npm org access):
#   1. Create packages on npm (if they don't exist):
#      - @telnyx/agent-toolkit
#      - @telnyx/agent-cli
#   2. For each package, go to Settings → Provenance and link:
#      - Repository: https://github.com/team-telnyx/ai
#      - Workflow: publish-npm.yml
#   3. Ensure publishConfig.access is "public" in each package.json
#
name: Publish npm
on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Which package to publish'
        required: true
        type: choice
        options:
          - all
          - typescript
          - cli
          - mcp
  release:
    types: [published]

jobs:
  publish-typescript:
    name: publish @telnyx/agent-toolkit
    runs-on: ubuntu-latest
    if: >-
      github.repository == 'team-telnyx/ai' &&
      (github.event_name == 'release' || github.event.inputs.package == 'all' || github.event.inputs.package == 'typescript')
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        working-directory: tools/typescript
        run: npm ci

      - name: Publish @telnyx/agent-toolkit
        run: bash ./bin/publish-npm tools/typescript

  publish-cli:
    name: publish @telnyx/agent-cli
    runs-on: ubuntu-latest
    if: >-
      github.repository == 'team-telnyx/ai' &&
      (github.event_name == 'release' || github.event.inputs.package == 'all' || github.event.inputs.package == 'cli')
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        working-directory: cli
        run: npm ci

      - name: Publish @telnyx/agent-cli
        run: bash ./bin/publish-npm cli

  publish-mcp:
    name: publish @telnyx/mcp
    runs-on: ubuntu-latest
    if: >-
      github.repository == 'team-telnyx/ai' &&
      (github.event_name == 'release' || github.event.inputs.package == 'all' || github.event.inputs.package == 'mcp')
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        working-directory: tools/mcp
        run: npm ci

      - name: Publish @telnyx/mcp
        run: bash ./bin/publish-npm tools/mcp

  publish-mcp-registry:
    name: publish to MCP Registry
    runs-on: ubuntu-latest
    needs: publish-mcp
    if: >-
      github.repository == 'team-telnyx/ai' &&
      (github.event_name == 'release' || github.event.inputs.package == 'all' || github.event.inputs.package == 'mcp')
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Update server.json version
        working-directory: tools/mcp
        run: |
          VERSION=$(jq -r '.version' package.json)
          jq --arg version "$VERSION" '.version = $version | .packages[0].version = $version' server.json > server.json.tmp
          mv server.json.tmp server.json
          echo "Updated server.json to version $VERSION"

      - name: Install MCP Publisher CLI
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/download/v1.2.3/mcp-publisher_1.2.3_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz
          mv mcp-publisher /usr/local/bin/

      - name: Login to MCP Registry (GitHub OIDC)
        run: mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        working-directory: tools/mcp
        run: mcp-publisher publish
